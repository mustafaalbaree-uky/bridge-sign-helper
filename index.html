<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#262a31" />
  <title>Bridge Sign Helper</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar">
    <header class="app-header">
      <div class="header-top">
        <div class="brand">Bridge Sign Helper</div>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
      </div>
      <nav class="tabs">
        <button id="navSetup" class="tab">Setup</button>
        <button id="navSigns" class="tab active">Signs</button>
        <button id="navReview" class="tab">Review <span id="syncDot" class="count" hidden></span></button>
      </nav>
    </header>
    <div id="statusBar" class="status" hidden></div>
  </div>

  <main id="view" class="view"></main>

  <script src="config.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="supabase.js"></script>
  <script src="data/signs.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
